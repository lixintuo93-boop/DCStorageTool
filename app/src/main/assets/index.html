<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!--
        使用 CryptoJS 4.x 实现 与目标 App 完全兼容的 AES 加解密
        Key/IV 使用 Latin1 编码（8字节），CryptoJS 非标准 key size
    -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script>
    /**
     * 解密：hospitalId + '@zk' 作为 Latin1 key
     *        hospitalId + '@kz' 作为 Latin1 iv
     *        CBC 模式，ZeroPadding
     * @param {string} hospitalId  例如 "10097"
     * @param {string} cipherB64   Base64 密文
     * @returns {string}           解密后的 UTF-8 字符串（如 "uuid-string"）
     */
    function decrypt(hospitalId, cipherB64) {
        try {
            var key = CryptoJS.enc.Latin1.parse(hospitalId + '@zk');
            var iv  = CryptoJS.enc.Latin1.parse(hospitalId + '@kz');
            var dec = CryptoJS.AES.decrypt(cipherB64, key, {
                iv: iv,
                padding: CryptoJS.pad.ZeroPadding
            });
            return dec.toString(CryptoJS.enc.Utf8);
        } catch (e) {
            return 'ERROR:' + e.message;
        }
    }

    /**
     * 加密：与 decrypt 完全对称
     * @param {string} hospitalId  例如 "10097"
     * @param {string} plaintext   明文（需已 JSON.stringify，例如 '"uuid-string"'）
     * @returns {string}           Base64 密文
     */
    function encrypt(hospitalId, plaintext) {
        try {
            var key = CryptoJS.enc.Latin1.parse(hospitalId + '@zk');
            var iv  = CryptoJS.enc.Latin1.parse(hospitalId + '@kz');
            var enc = CryptoJS.AES.encrypt(
                CryptoJS.enc.Utf8.parse(plaintext),
                key,
                { iv: iv, padding: CryptoJS.pad.ZeroPadding }
            );
            return enc.toString();
        } catch (e) {
            return 'ERROR:' + e.message;
        }
    }

    /**
     * 加密（用于 token / SharedPreferences 存储）
     * 与 encrypt 算法相同，但 plaintext 不额外包裹引号
     * @param {string} hospitalId  例如 "10097"
     * @param {string} plaintext   明文（原始 JSON 字符串，无需 JSON.stringify 包裹）
     * @returns {string}           Base64 密文
     */
    function encryptByAES(hospitalId, plaintext) {
        try {
            var key = CryptoJS.enc.Latin1.parse(hospitalId + '@zk');
            var iv  = CryptoJS.enc.Latin1.parse(hospitalId + '@kz');
            var enc = CryptoJS.AES.encrypt(
                CryptoJS.enc.Utf8.parse(plaintext),
                key,
                { iv: iv, padding: CryptoJS.pad.ZeroPadding }
            );
            return enc.toString();
        } catch (e) {
            return 'ERROR:' + e.message;
        }
    }

    /**
     * 解密（用于 token / SharedPreferences 存储）
     * 与 decrypt 算法相同，参数顺序不同以匹配 App 内 JS 调用
     * @param {string} cipherText  Base64 密文
     * @param {string} hospitalId  例如 "10097"
     * @returns {string}           解密后的明文
     */
    function decryptByAes(cipherText, hospitalId) {
        return decrypt(hospitalId, cipherText);
    }
    </script>
</head>
<body>
    <p style="color:green;font-family:monospace">CryptoJS Ready</p>
</body>
</html>
